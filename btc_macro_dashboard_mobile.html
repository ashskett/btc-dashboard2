<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Helpers ─────────────────────────────────────────────────
const fmt  = (n,d=0) => n==null?"—":Number(n).toLocaleString("en-US",{maximumFractionDigits:d});
const pct  = (n,d=2) => n==null?"—":(n>=0?"+":"")+Number(n).toFixed(d)+"%";
const bil  = n => n==null?"—":"$"+(n/1e9).toFixed(2)+"B";
const SIG  = {bull:"#00e5a0", bear:"#ff4d6d", neutral:"#8892a4"};
const REFRESH = 60000;

// ── Liquidity Monitor helpers ────────────────────────────────
function sma(arr, n) {
  if (!arr || arr.length < n) return null;
  return arr.slice(-n).reduce((a,b)=>a+b,0)/n;
}
function rsiArr(arr, n=14) {
  if (!arr || arr.length < n+1) return null;
  let ag=0,al=0;
  for(let i=1;i<=n;i++){const d=arr[i]-arr[i-1];d>=0?ag+=d:al-=d;}
  ag/=n;al/=n;
  for(let i=n+1;i<arr.length;i++){const d=arr[i]-arr[i-1];ag=(ag*(n-1)+(d>=0?d:0))/n;al=(al*(n-1)+(d<0?-d:0))/n;}
  return al===0?100:100-(100/(1+ag/al));
}
function pctChg10d(arr) {
  if(!arr||arr.length<11)return null;
  const prev=arr[arr.length-11],cur=arr[arr.length-1];
  return prev>0?(cur-prev)/prev*100:null;
}
function corrPearson(a,b,n=20){
  if(!a||!b||a.length<n||b.length<n)return null;
  const ax=a.slice(-n),bx=b.slice(-n);
  const ma=ax.reduce((s,v)=>s+v,0)/n,mb=bx.reduce((s,v)=>s+v,0)/n;
  let num=0,da=0,db=0;
  for(let i=0;i<n;i++){const x=ax[i]-ma,y=bx[i]-mb;num+=x*y;da+=x*x;db+=y*y;}
  return da===0||db===0?0:num/Math.sqrt(da*db);
}

// ── Fetch Liquidity Monitor data (free public sources) ───────
async function fetchLiquidityData() {
  function withTimeout(p,ms){return new Promise(function(res,rej){var t2=setTimeout(function(){rej(new Error("to"));},ms);p.then(function(v){clearTimeout(t2);res(v);},function(e){clearTimeout(t2);rej(e);});});}

  async function fetchDXY() {
    var period1=Math.floor((Date.now()/1000)-220*86400);
    var period2=Math.floor(Date.now()/1000+86400);
    var url="https://query1.finance.yahoo.com/v8/finance/chart/DX-Y.NYB?period1="+period1+"&period2="+period2+"&interval=1d";
    try {
      var r=await withTimeout(fetch(url),8000);
      if(r.ok){var j=await r.json();var c=j&&j.chart&&j.chart.result&&j.chart.result[0]&&j.chart.result[0].indicators.quote[0].close;if(c&&c.length>10)return c.filter(function(v){return v!=null&&!isNaN(v);});}
    }catch(_){}
    try {
      var r2=await withTimeout(fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url)),18000);
      if(r2.ok){var j2=await r2.json();var p2=JSON.parse(j2.contents||"{}");var c2=p2&&p2.chart&&p2.chart.result&&p2.chart.result[0]&&p2.chart.result[0].indicators.quote[0].close;if(c2&&c2.length>10)return c2.filter(function(v){return v!=null&&!isNaN(v);});}
    }catch(_){}
    return null;
  }

  async function fetchGold() {
    try {
      var r=await withTimeout(fetch("https://api.binance.com/api/v3/klines?symbol=XAUUSDT&interval=1d&limit=220"),8000);
      if(!r.ok)return null;
      var j=await r.json();
      if(!j||!j.length)return null;
      return j.map(function(k){return parseFloat(k[4]);}).filter(function(v){return !isNaN(v);});
    }catch(_){return null;}
  }

  async function fetchUS10Y() {
    var url="https://fred.stlouisfed.org/graph/fredgraph.csv?id=DGS10";
    try {
      var r=await withTimeout(fetch(url),8000);
      if(r.ok){
        var txt=await r.text();
        var lines=txt.split("\n").filter(function(l){return l&&!l.startsWith("DATE")&&l.indexOf(".")>-1;});
        var vals=lines.map(function(l){var p=l.split(",");return parseFloat(p[1]);}).filter(function(v){return !isNaN(v);});
        if(vals.length>10)return vals.slice(-220);
      }
    }catch(_){}
    try {
      var r2=await withTimeout(fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url)),18000);
      if(r2.ok){
        var j2=await r2.json();
        var lines2=(j2.contents||"").split("\n").filter(function(l){return l&&!l.startsWith("DATE")&&l.indexOf(".")>-1;});
        var vals2=lines2.map(function(l){var p=l.split(",");return parseFloat(p[1]);}).filter(function(v){return !isNaN(v);});
        if(vals2.length>10)return vals2.slice(-220);
      }
    }catch(_){}
    return null;
  }

  async function fetchVIX() {
    var period1=Math.floor((Date.now()/1000)-220*86400);
    var period2=Math.floor(Date.now()/1000+86400);
    try {
      var r=await withTimeout(fetch("https://query1.finance.yahoo.com/v8/finance/chart/%5EVIX?period1="+period1+"&period2="+period2+"&interval=1d"),8000);
      if(r.ok){var j=await r.json();var c=j&&j.chart&&j.chart.result&&j.chart.result[0]&&j.chart.result[0].indicators.quote[0].close;if(c&&c.length>10)return c.filter(function(v){return v!=null&&!isNaN(v);});}
    }catch(_){}
    try {
      var r2=await withTimeout(fetch("https://query2.finance.yahoo.com/v8/finance/chart/%5EVIX?period1="+period1+"&period2="+period2+"&interval=1d"),8000);
      if(r2.ok){var j2=await r2.json();var c2=j2&&j2.chart&&j2.chart.result&&j2.chart.result[0]&&j2.chart.result[0].indicators.quote[0].close;if(c2&&c2.length>10)return c2.filter(function(v){return v!=null&&!isNaN(v);});}
    }catch(_){}
    return null;
  }

  var results=await Promise.all([fetchDXY(), fetchGold(), fetchUS10Y(), fetchVIX()]);
  var dxyC=results[0], goldC=results[1], us10yC=results[2], vixC=results[3];
  function toWeekly(c){if(!c||c.length<5)return c;var w=[];for(var i=4;i<c.length;i+=5)w.push(c[i]);return w;}
  return {dxyC,dxyW:toWeekly(dxyC),goldC,us10yC,vixC,status:{dxy:!!dxyC,gold:!!goldC,us10y:!!us10yC,vix:!!vixC}};
}

function calcLiquidityScore(ld, btcDailyCloses) {
  if(!ld)return {score:null,regime:"—",sigs:{},detail:{}};
  const {dxyC,dxyW,goldC,us10yC,vixC}=ld;

  // ── DXY signals (weight 55%) ──────────────────────────────
  const dxy200=sma(dxyC,200);
  const sig1 = dxyC&&dxy200&&dxyC[dxyC.length-1]>dxy200;

  // Weekly close > 52-week high (prior)
  const dxyW52High = dxyW&&dxyW.length>52?Math.max(...dxyW.slice(-53,-1)):null;
  const sig2 = dxyW&&dxyW52High&&dxyW[dxyW.length-1]>dxyW52High;

  const dxy10d = pctChg10d(dxyC);
  const sig3 = dxy10d!=null&&dxy10d>=2.5;

  const dxyRSI = rsiArr(dxyC,14);
  const sig4 = dxyRSI!=null&&dxyRSI>=60;

  const dxyCount=(sig1?1:0)+(sig2?1:0)+(sig3?1:0)+(sig4?1:0);
  const scoreDXY=(dxyCount/4)*55;

  // ── US10Y signals (weight 20%) ────────────────────────────
  const us10y200=sma(us10yC,200);
  const y1=us10yC&&us10y200&&us10yC[us10yC.length-1]>us10y200;
  const us10y10d=pctChg10d(us10yC);
  const y2=us10y10d!=null&&us10y10d>=2.0;
  const yldRSI=rsiArr(us10yC,14);
  const y3=yldRSI!=null&&yldRSI>=60;
  const yldCount=(y1?1:0)+(y2?1:0)+(y3?1:0);
  const scoreYLD=(yldCount/3)*20;

  // ── Gold signals (weight 15%) ─────────────────────────────
  const gold50=sma(goldC,50);
  const g1=goldC&&gold50&&dxyC&&dxy200&&goldC[goldC.length-1]<gold50&&dxyC[dxyC.length-1]>dxy200;

  // Gold vs DXY daily return correlation (20d)
  const goldRets=goldC&&goldC.length>1?goldC.slice(1).map(function(v,i){return v-goldC[i];}):null;
  const dxyRets=dxyC&&dxyC.length>1?dxyC.slice(1).map(function(v,i){return v-dxyC[i];}):null;
  const goldDxyCorr=corrPearson(goldRets,dxyRets,20);
  const g2=goldDxyCorr!=null&&goldDxyCorr<-0.4;

  const goldCount=(g1?1:0)+(g2?1:0);
  const scoreGold=(goldCount/2)*15;

  // ── BTC signals (weight 10%) ──────────────────────────────
  const btc50d=btcDailyCloses&&btcDailyCloses.length>=50?sma(btcDailyCloses,50):null;
  const b1=btcDailyCloses&&btc50d&&dxyC&&dxy200&&btcDailyCloses[btcDailyCloses.length-1]<btc50d&&dxyC[dxyC.length-1]>dxy200;
  const btcRets=btcDailyCloses&&btcDailyCloses.length>1?btcDailyCloses.slice(1).map(function(v,i){return v-btcDailyCloses[i];}):null;
  const btcDxyCorr=corrPearson(btcRets,dxyRets,20);
  const b2=btcDxyCorr!=null&&btcDxyCorr<-0.4;
  const btcCount=(b1?1:0)+(b2?1:0);
  const scoreBTC=(btcCount/2)*10;

  // ── VIX amplifier (+0 to +10) ─────────────────────────────
  const vix50d=sma(vixC,50);
  const v1=vixC&&vix50d&&vixC[vixC.length-1]>vix50d;
  const vix10d=pctChg10d(vixC);
  const v2=vix10d!=null&&vix10d>=15;
  const vixRSI=rsiArr(vixC,14);
  const v3=vixRSI!=null&&vixRSI>=60;
  const vixCount=(v1?1:0)+(v2?1:0)+(v3?1:0);
  const vixAmp=Math.min(10,(vixCount/3)*10);

  const scoreBase=scoreDXY+scoreYLD+scoreGold+scoreBTC;
  const score=Math.min(100,scoreBase+vixAmp);
  const regime=score<=30?"GREEN":score<=60?"AMBER":"RED";

  const action=regime==="GREEN"
    ?"Risk-on · Accumulation OK · Leverage allowed"
    :regime==="AMBER"
    ?"Reduce leverage · Tighten stops · Raise cash"
    :"No leverage · Hedge BTC · Defensive posture";

  return {
    score:Math.round(score*10)/10,
    regime,action,
    sigs:{
      dxy:{count:dxyCount,of:4,score:scoreDXY.toFixed(1),val:dxyC?dxyC[dxyC.length-1].toFixed(2):null,rsi:dxyRSI?dxyRSI.toFixed(1):null},
      us10y:{count:yldCount,of:3,score:scoreYLD.toFixed(1),val:us10yC?us10yC[us10yC.length-1].toFixed(3):null,rsi:yldRSI?yldRSI.toFixed(1):null},
      gold:{count:goldCount,of:2,score:scoreGold.toFixed(1),val:goldC?goldC[goldC.length-1].toFixed(0):null},
      btc:{count:btcCount,of:2,score:scoreBTC.toFixed(1)},
      vix:{count:vixCount,of:3,amp:vixAmp.toFixed(1),val:vixC?vixC[vixC.length-1].toFixed(2):null,rsi:vixRSI?vixRSI.toFixed(1):null},
    },
    flags:{sig1,sig2,sig3,sig4,y1,y2,y3,g1,g2,b1,b2,v1,v2,v3},
    vixAmp
  };
}

// ── LiquidityBar component ────────────────────────────────────
function LiquidityBar({liq,liqLoading}){
  const score=liq&&liq.score!=null?liq.score:null;
  const regime=liq?liq.regime:"—";
  const action=liq?liq.action:"Calculating…";
  const regColor=regime==="RED"?"#ff4d6d":regime==="AMBER"?"#f59e0b":regime==="GREEN"?"#00e5a0":"#8892a4";
  const bgColor=regime==="RED"?"rgba(255,77,109,0.07)":regime==="AMBER"?"rgba(245,158,11,0.07)":regime==="GREEN"?"rgba(0,229,160,0.06)":"rgba(255,255,255,0.03)";
  const barPct=score!=null?Math.min(100,score):0;
  const barColor=barPct>60?"#ff4d6d":barPct>30?"#f59e0b":"#00e5a0";

  // Mini signal pills for liquidity
  const sigs=liq?liq.sigs:{};
  const flags=liq?liq.flags:{};
  const miniSigs=[
    {l:"DXY",ok:sigs.dxy&&sigs.dxy.count>0,v:sigs.dxy&&sigs.dxy.val},
    {l:"US10Y",ok:sigs.us10y&&sigs.us10y.count>0,v:sigs.us10y&&sigs.us10y.val?sigs.us10y.val+"%":null},
    {l:"Gold",ok:sigs.gold&&sigs.gold.count>0,v:sigs.gold&&sigs.gold.val?"$"+sigs.gold.val:null},
    {l:"VIX",ok:sigs.vix&&sigs.vix.count>0,v:sigs.vix&&sigs.vix.val},
    {l:"BTC",ok:sigs.btc&&sigs.btc.count>0,v:null},
  ];

  return(
    <div style={{margin:"10px 14px 0",borderRadius:14,background:bgColor,
      border:`1px solid ${regColor}25`,padding:"13px 14px",
      animation:"fadein 0.4s ease",position:"relative",overflow:"hidden"}}>
      {/* Top accent line */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${regColor},${regColor}30)`}}/>

      {/* Header row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div>
          <div style={{fontSize:7.5,letterSpacing:"0.18em",color:"rgba(255,255,255,0.25)",textTransform:"uppercase",marginBottom:2}}>GLOBAL LIQUIDITY RISK</div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{fontSize:22,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:"white",lineHeight:1}}>
              {score!=null?score:"—"}
            </div>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.2)"}}>/100</div>
            <div style={{background:`${regColor}18`,border:`1px solid ${regColor}40`,borderRadius:5,padding:"3px 9px",fontSize:9,fontWeight:700,color:regColor,letterSpacing:"0.09em"}}>
              {liqLoading&&score==null?"…":regime}
            </div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:7.5,color:"rgba(255,255,255,0.2)",letterSpacing:"0.1em",marginBottom:3}}>VIX AMP</div>
          <div style={{fontSize:13,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:liq&&liq.vixAmp>0?"#f59e0b":"rgba(255,255,255,0.3)"}}>+{liq?liq.vixAmp.toFixed(1):"0.0"}</div>
        </div>
      </div>

      {/* Score bar */}
      <div style={{background:"rgba(255,255,255,0.07)",borderRadius:99,height:5,marginBottom:10,overflow:"hidden"}}>
        <div style={{height:"100%",width:barPct+"%",background:`linear-gradient(90deg,#00e5a0,${barColor})`,borderRadius:99,transition:"width 0.8s ease"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:7,color:"rgba(255,255,255,0.2)",marginBottom:10,letterSpacing:"0.05em"}}>
        <span>GREEN 0–30</span>
        <span>AMBER 30–60</span>
        <span>RED 60+</span>
      </div>

      {/* Signal pills */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
        {miniSigs.map(function({l,ok,v}){
          const c=ok?"#f59e0b":"rgba(255,255,255,0.2)";
          return<div key={l} style={{background:ok?"rgba(245,158,11,0.1)":"rgba(255,255,255,0.04)",
            border:`1px solid ${ok?"rgba(245,158,11,0.25)":"rgba(255,255,255,0.08)"}`,
            borderRadius:6,padding:"4px 8px",display:"flex",flexDirection:"column",alignItems:"center",minWidth:44}}>
            <div style={{fontSize:7,color:"rgba(255,255,255,0.3)",letterSpacing:"0.06em",marginBottom:1}}>{l}</div>
            <div style={{fontSize:8,fontWeight:700,color:c}}>{ok?"▲ ON":"● —"}</div>
            {v&&<div style={{fontSize:7,color:"rgba(255,255,255,0.3)",marginTop:1,fontFamily:"'JetBrains Mono',monospace"}}>{v}</div>}
          </div>;
        })}
      </div>

      {/* Action line */}
      <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:8,display:"flex",alignItems:"center",gap:6}}>
        <div style={{width:5,height:5,borderRadius:"50%",background:regColor,flexShrink:0}}/>
        <div style={{fontSize:10,color:regColor,fontWeight:600,lineHeight:1.4}}>{action}</div>
      </div>
    </div>
  );
}

async function tracked(url, fb, errs, proxied) {
  fb = fb===undefined?null:fb; errs=errs||[]; proxied=proxied||[];
  function withTimeout(promise, ms) {
    return new Promise(function(res,rej){
      var t=setTimeout(function(){rej(new Error("timeout"));},ms);
      promise.then(function(v){clearTimeout(t);res(v);},function(e){clearTimeout(t);rej(e);});
    });
  }
  try {
    var r = await withTimeout(fetch(url), 6000);
    if (r.ok) return await r.json();
  } catch(_) {}
  try {
    proxied.push(1);
    var r2 = await withTimeout(fetch("https://api.allorigins.win/get?url="+encodeURIComponent(url)), 12000);
    if (!r2.ok) throw new Error();
    return JSON.parse((await r2.json()).contents);
  } catch(_) { errs.push(url.split("?")[0].split("/").pop()); return fb; }
}

function calcOBV(candles) {
  let obv=0; const arr=[];
  for(let i=0;i<candles.length;i++){
    if(i===0){arr.push(0);continue;}
    const c=parseFloat(candles[i][4]),p=parseFloat(candles[i-1][4]),v=parseFloat(candles[i][5]);
    obv+=c>p?v:c<p?-v:0; arr.push(obv);
  }
  return arr;
}
function emaCalc(arr,n){const k=2/(n+1);let e=arr[0];return arr.map((v,i)=>i===0?v:(e=v*k+e*(1-k)));}
function rsiCalc(c,n=14){
  if(c.length<n+1)return null;
  let ag=0,al=0;
  for(let i=1;i<=n;i++){const d=c[i]-c[i-1];d>=0?ag+=d:al-=d;}
  ag/=n;al/=n;
  for(let i=n+1;i<c.length;i++){const d=c[i]-c[i-1];ag=(ag*(n-1)+(d>=0?d:0))/n;al=(al*(n-1)+(d<0?-d:0))/n;}
  return al===0?100:100-(100/(1+ag/al));
}

// ── Micro components ─────────────────────────────────────────
function Spark({data,color,h=28}){
  if(!data||data.length<2)return<div style={{height:h}}/>;
  const v=data.map(Number).filter(x=>!isNaN(x));
  const mn=Math.min(...v),mx=Math.max(...v),rng=mx-mn||1,W=90;
  const pts=v.map((x,i)=>`${i/(v.length-1)*W},${h-((x-mn)/rng)*(h-3)-1.5}`).join(" ");
  return<svg width={W} height={h} style={{display:"block",flexShrink:0}}>
    <polyline points={pts} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>;
}

function Arc({value,min=0,max=100,label,color}){
  const p=Math.max(0,Math.min(1,(value-min)/(max-min)));
  const r=30,cx=40,cy=44;
  const pt=d=>{const a=(d-90)*Math.PI/180;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};};
  const s=pt(-135),e=pt(-135+p*270),ts=pt(-135),te=pt(135);
  return<svg viewBox="0 0 80 56" style={{width:66,height:46,flexShrink:0}}>
    <path d={`M${ts.x},${ts.y} A${r},${r} 0 1,1 ${te.x},${te.y}`} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="4.5" strokeLinecap="round"/>

// ── Candle chart (mobile-optimised, 30 candles) ──────────────
function CandleChart({candles,h=140}){
  if(!candles||candles.length<2)return(
    <div style={{height:h,display:"flex",alignItems:"center",justifyContent:"center",
      color:"rgba(255,255,255,0.2)",fontSize:11}}>Loading chart…</div>
  );
  const W=360,padL=4,padR=32,padT=6,padB=18,iW=W-padL-padR,iH=h-padT-padB;
  const sl=candles.slice(-30);
  const op=sl.map(c=>parseFloat(c[1])),hi=sl.map(c=>parseFloat(c[2]));
  const lo=sl.map(c=>parseFloat(c[3])),cl=sl.map(c=>parseFloat(c[4]));
  const vl=sl.map(c=>parseFloat(c[5]));
  const minP=Math.min(...lo)*0.999,maxP=Math.max(...hi)*1.001,rngP=maxP-minP;
  const maxV=Math.max(...vl)||1,volH=iH*0.18;
  const sY=v=>padT+iH-((v-minP)/rngP)*iH;
  const n=sl.length,cW=iW/n,gap=Math.max(0.5,cW*0.12),bW=Math.max(1,cW-gap*2);
  const e20=emaCalc(cl,20),e50=emaCalc(cl,50);
  const ePath=arr=>arr.map((v,i)=>`${i===0?"M":"L"}${padL+i*cW+cW/2},${sY(v)}`).join(" ");
  const labels=Array.from({length:4},(_,i)=>minP+(rngP/3)*i);
  return(
    <svg viewBox={`0 0 ${W} ${h}`} style={{width:"100%",height:h,display:"block"}}>
      {labels.map((p,i)=><g key={i}>
        <line x1={padL} y1={sY(p)} x2={W-padR} y2={sY(p)} stroke="rgba(255,255,255,0.04)" strokeWidth="1"/>
        <text x={W-padR+3} y={sY(p)+3.5} fill="rgba(255,255,255,0.22)" fontSize="6" fontFamily="monospace">${Math.round(p/1000)}k</text>
      </g>)}
      {sl.map((_,i)=>{
        const x=padL+i*cW,up=cl[i]>=op[i],vh=Math.max(1,(vl[i]/maxV)*volH);
        return<rect key={"v"+i} x={x+gap} y={h-padB-vh} width={bW} height={vh} fill={up?"rgba(0,229,160,0.18)":"rgba(255,77,109,0.18)"}/>;
      })}
      <path d={ePath(e20)} fill="none" stroke="#facc15" strokeWidth="1.1" opacity="0.7" strokeLinejoin="round"/>
      <path d={ePath(e50)} fill="none" stroke="#818cf8" strokeWidth="1.1" opacity="0.7" strokeLinejoin="round"/>
      {sl.map((_,i)=>{
        const x=padL+i*cW,cx2=x+cW/2,up=cl[i]>=op[i],col=up?"#00e5a0":"#ff4d6d";
        const bT=Math.min(sY(op[i]),sY(cl[i])),bH=Math.max(1,Math.abs(sY(op[i])-sY(cl[i])));
        return<g key={i}>
          <line x1={cx2} y1={sY(hi[i])} x2={cx2} y2={sY(lo[i])} stroke={col} strokeWidth="0.9" opacity="0.8"/>
          <rect x={x+gap} y={bT} width={bW} height={bH} fill={up?col:"transparent"} stroke={col} strokeWidth="0.9"/>
        </g>;
      })}
      {cl.length>0&&<line x1={padL} y1={sY(cl[cl.length-1])} x2={W-padR} y2={sY(cl[cl.length-1])} stroke="white" strokeWidth="0.5" strokeDasharray="2,3" opacity="0.25"/>}
    </svg>
  );
}

// ── Main App ─────────────────────────────────────────────────
function App(){
  const [d,setD]=useState({});
  const [loading,setLoading]=useState(true);
  const [lastUp,setLastUp]=useState(null);
  const [overall,setOverall]=useState("neutral");
  const [sheet,setSheet]=useState(null); // "settings"|"checklist"|null
  const [tab,setTab]=useState("signals"); // "chart"|"signals"|"manual"
  const [glassnodeKey,setGlassnodeKey]=useState(()=>localStorage.getItem("gn_key")||"");
  const [liq,setLiq]=useState(null);
  const [liqLoading,setLiqLoading]=useState(true);
  const timer=useRef(null);

  const fetchAll=useCallback(async()=>{
    setLoading(true);
    const errs=[],proxied=[];
    const t=(url,fb=null)=>tracked(url,fb,errs,proxied);

    const [price,global,fng,funding,oiHist,wklyCandles,dailyCandles,etfData,reservesData]=await Promise.all([
      t("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true"),
      t("https://api.coingecko.com/api/v3/global"),
      t("https://api.alternative.me/fng/?limit=7"),
      t("https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=8"),
      t("https://fapi.binance.com/futures/data/openInterestHist?symbol=BTCUSDT&period=1d&limit=14"),
      t("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1w&limit=52"),
      t("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=90"),
      glassnodeKey
        ? t(`https://api.glassnode.com/v1/metrics/institutions/purpose_etf_holdings_sum?a=BTC&i=24h&f=JSON&api_key=${glassnodeKey}`,null)
        : t("https://open-api.coinglass.com/public/v2/bitcoin/etf_flow_list",null),
      glassnodeKey
        ? t(`https://api.glassnode.com/v1/metrics/distribution/balance_exchanges_all?a=BTC&i=24h&f=JSON&api_key=${glassnodeKey}`,null)
        : Promise.resolve(null),
    ]);

    // ── Parse ──────────────────────────────────────────────
    const btcPrice=(price&&price.bitcoin?price.bitcoin.usd:null), btcChg=(price&&price.bitcoin?price.bitcoin.usd_24h_change:null);
    const dom=(global&&global.data&&global.data.market_cap_percentage?global.data.market_cap_percentage.btc:null);
    const fngVals=(fng&&fng.data?fng.data.map(function(x){return parseInt(x.value);}).reverse():[]);
    const fngCur=fngVals[fngVals.length-1], fngLbl=(fng&&fng.data&&fng.data[0]?fng.data[0].value_classification:"—");
    const fundRates=(funding?funding.map(function(f){return parseFloat(f.fundingRate)*100;}):[]);
    const fundLast=fundRates[fundRates.length-1], fund8h=fundLast!=null?fundLast*3*365:null;
    const oiVals=(oiHist?oiHist.map(function(x){return parseFloat(x.sumOpenInterest)*(btcPrice||0);}):[]);
    const oiChg=oiVals.length>=2?(oiVals[oiVals.length-1]-oiVals[0])/oiVals[0]*100:null;
    const oiTrend=oiChg!=null?(oiChg>3?"rising":oiChg<-3?"falling":"flat"):null;
    // OBV
    const wklyCloses=(wklyCandles?wklyCandles.map(function(c){return parseFloat(c[4]);}):[]);
    const wklyObvArr=(wklyCandles?calcOBV(wklyCandles):[]);
    const obvEMAArr=wklyObvArr.length>10?emaCalc(wklyObvArr,10):[];
    const obvLast=wklyObvArr[wklyObvArr.length-1], obvEMALast=obvEMAArr[obvEMAArr.length-1];
    const priceNow=wklyCloses[wklyCloses.length-1], price4w=wklyCloses[wklyCloses.length-5];
    const obvAboveMA=obvLast!=null&&obvEMALast!=null&&obvLast>obvEMALast;
    const obvBullDiv=obvAboveMA&&priceNow<price4w, obvBearDiv=!obvAboveMA&&priceNow>price4w;
    // RSI
    const wklyRSI=wklyCloses.length>=15?rsiCalc(wklyCloses):null;
    const rsiHistory=[];
    if(wklyCloses.length>26)for(let i=wklyCloses.length-12;i<wklyCloses.length;i++)rsiHistory.push(rsiCalc(wklyCloses.slice(0,i+1)));
    // Volume
    const wklyVols=(wklyCandles?wklyCandles.map(function(c){return parseFloat(c[5]);}):[]);
    const volMA20=wklyVols.length>=20?wklyVols.slice(-20).reduce((a,b)=>a+b,0)/20:null;
    const lastVol=wklyVols[wklyVols.length-1];
    const lastCdl=wklyCandles?parseFloat(wklyCandles[wklyCandles.length-1][4])-parseFloat(wklyCandles[wklyCandles.length-1][1]):0;
    const volCapit=volMA20!=null&&lastVol>volMA20*1.5&&lastCdl<0;
    const volDist=volMA20!=null&&lastVol>volMA20*1.5&&lastCdl>0;
    const volRatio=volMA20!=null?lastVol/volMA20:null;
    // ETF
    let etfFlows=[],etfLatest=null,etfSig="neutral",etfAvg7=null,etfMode="none";
    try{
      let rows=etfData&&etfData.data&&Array.isArray(etfData.data)?etfData.data:Array.isArray(etfData)?etfData:null;
      if(rows&&rows.length>0){
        if(rows[0].t!==undefined&&rows[0].v!==undefined){
          etfMode="glassnode";
          const h=rows.slice(-15).map(r=>r.v),fl=[];
          for(let i=1;i<h.length;i++)fl.push(h[i]-h[i-1]);
          etfFlows=fl.slice(-14); etfLatest=etfFlows[etfFlows.length-1];
          etfAvg7=etfFlows.slice(-7).reduce((a,b)=>a+b,0)/7;
          etfSig=etfAvg7>200?"bull":etfAvg7<-200?"bear":"neutral";
        } else {
          etfMode="coinglass";
          const fk=Object.keys(rows[0]).find(k=>/flow|netflow/i.test(k)&&!/fund|name/i.test(k));
          if(fk){
            const by={};rows.forEach(r=>{by[r.date||"x"]=(by[r.date||"x"]||0)+parseFloat(r[fk])||0;});
            etfFlows=Object.values(by).slice(-14); etfLatest=etfFlows[etfFlows.length-1];
            if(Math.abs(etfLatest)>1e8){etfFlows=etfFlows.map(v=>v/1e6);etfLatest/=1e6;}
            etfAvg7=etfFlows.slice(-7).reduce((a,b)=>a+b,0)/7;
            etfSig=etfAvg7>50?"bull":etfAvg7<-50?"bear":"neutral";
          }
        }
      }
    }catch(_){}
    // Reserves
    let resHist=[],resLatest=null,resTrend=null,resSig="neutral",resChg=null;
    try{
      var rv=null;
      if(Array.isArray(reservesData)&&reservesData[0]&&reservesData[0].v!==undefined){rv=reservesData.map(function(p){return p.v;});}
      else if(reservesData&&reservesData.values){rv=reservesData.values.map(function(p){return p.y;});}
      if(rv&&rv.length>1){
        resHist=rv.slice(-90); resLatest=resHist[resHist.length-1];
        const prev=resHist[Math.max(0,resHist.length-15)];
        resChg=prev?(resLatest-prev)/prev*100:null;
        resTrend=resChg!=null?(resChg<-0.3?"falling":resChg>0.3?"rising":"flat"):null;
        resSig=resTrend==="falling"?"bull":resTrend==="rising"?"bear":"neutral";
      }
    }catch(_){}
    // Signals
    const domSig=dom>52?"bull":dom<48?"bear":"neutral";
    const fngSig=fngCur<30?"bull":fngCur>65?"bear":"neutral";
    const fundSig=fundLast!=null?(fundLast<-0.005?"bull":fundLast>0.01?"bear":"neutral"):"neutral";
    const oiSig=oiTrend==="rising"&&btcChg>0?"bull":oiTrend==="rising"&&btcChg<0?"bear":"neutral";
    const obvSig=obvBullDiv?"bull":obvBearDiv?"bear":obvAboveMA?"bull":"neutral";
    const rsiSig=wklyRSI!=null?(wklyRSI<40?"bull":wklyRSI>65?"bear":"neutral"):"neutral";
    const volSig=volCapit?"bull":volDist?"bear":"neutral";
    const allSigs=[domSig,fngSig,fundSig,oiSig,obvSig,rsiSig,volSig,etfSig,resSig];
    const sc={bull:0,bear:0,neutral:0}; allSigs.forEach(s=>sc[s]++);
    const ovr=sc.bull>=4?"bull":sc.bear>=4?"bear":sc.bull>sc.bear?"bull":sc.bear>sc.bull?"bear":"neutral";

    setD({btcPrice,btcChg,dom,fngVals,fngCur,fngLbl,fundRates,fundLast,fund8h,
      oiVals,oiChg,oiTrend,domSig,fngSig,fundSig,oiSig,
      wklyObvArr,obvEMALast,obvLast,obvAboveMA,obvBullDiv,obvBearDiv,obvSig,
      wklyRSI,rsiSig,rsiHistory,wklyVols,volCapit,volDist,volSig,volRatio,
      dailyCandles,etfFlows,etfLatest,etfSig,etfAvg7,etfMode,
      resHist,resLatest,resTrend,resSig,resChg,
      bullCount:sc.bull,bearCount:sc.bear});
    setOverall(ovr);
    setLastUp(new Date());
    setLoading(false);
  },[glassnodeKey]);

  useEffect(()=>{fetchAll();timer.current=setInterval(fetchAll,REFRESH);return()=>clearInterval(timer.current);},[fetchAll]);

  // ── Fetch liquidity data (every 5 min, separate from BTC signals) ──
  const fetchLiq=useCallback(async()=>{
    setLiqLoading(true);
    try{
      const ld=await fetchLiquidityData();
      // Get BTC daily closes from existing data or re-fetch
      const btcRaw=await tracked("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=220",null);
      const btcCloses=btcRaw?btcRaw.map(function(c){return parseFloat(c[4]);}):null;
      const result=calcLiquidityScore(ld,btcCloses);
      setLiq(result);
    }catch(_){}
    setLiqLoading(false);
  },[]);

  useEffect(()=>{fetchLiq();const t=setInterval(fetchLiq,300000);return()=>clearInterval(t);},[fetchLiq]);

  const OC=SIG[overall], fngColor=d.fngCur<25?"#00e5a0":d.fngCur<45?"#4ade80":d.fngCur<55?"#facc15":d.fngCur<75?"#fb923c":"#ff4d6d";
  const sigList=[
    {l:"DOM",s:d.domSig},{l:"F&G",s:d.fngSig},{l:"FUND",s:d.fundSig},
    {l:"OI",s:d.oiSig},{l:"OBV",s:d.obvSig},{l:"RSI",s:d.rsiSig},
    {l:"VOL",s:d.volSig},{l:"ETF",s:d.etfSig},{l:"RSRV",s:d.resSig},
  ];

  const TABS=[{id:"chart",icon:"📈",label:"Chart"},{id:"signals",icon:"📊",label:"Signals"},{id:"manual",icon:"🔗",label:"Links"}];

  return(
    <div style={{minHeight:"100vh",paddingBottom:72,
      background:"radial-gradient(ellipse 90% 30% at 50% -2%,rgba(0,229,160,0.04),transparent) #080c17"}}>

      {/* ── Sticky header ── */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(8,12,23,0.95)",
        backdropFilter:"blur(16px)",borderBottom:"1px solid rgba(255,255,255,0.06)",
        padding:"10px 16px 8px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:8,letterSpacing:"0.18em",color:"rgba(255,255,255,0.2)",textTransform:"uppercase",marginBottom:1}}>SMC Bot · Macro</div>
            <div style={{fontSize:20,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"-0.02em",lineHeight:1.1}}>
              BTC{" "}
              <span style={{color:d.btcChg>=0?"#00e5a0":"#ff4d6d"}}>
                {d.btcPrice?"$"+fmt(d.btcPrice):loading?"…":"—"}
              </span>
              {d.btcChg!=null&&<span style={{fontSize:11,marginLeft:5,color:d.btcChg>=0?"#00e5a0":"#ff4d6d"}}>{pct(d.btcChg)}</span>}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{display:"flex",alignItems:"center",gap:5,justifyContent:"flex-end",marginBottom:4}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:OC,animation:loading?"pulse 1s infinite":"none"}}/>
              <span style={{fontSize:9,fontWeight:700,color:OC,letterSpacing:"0.08em",maxWidth:130,textAlign:"right",lineHeight:1.2}}>
                {overall==="bull"?"MACRO BULLISH":overall==="bear"?"MACRO BEARISH":"MACRO NEUTRAL"}
              </span>
            </div>
            <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
              <button onClick={fetchAll} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"4px 9px",color:"rgba(255,255,255,0.5)",fontSize:10,cursor:"pointer"}}>↻</button>
              <button onClick={()=>setSheet("settings")} style={{background:glassnodeKey?"rgba(0,229,160,0.12)":"rgba(250,204,21,0.1)",border:`1px solid ${glassnodeKey?"rgba(0,229,160,0.25)":"rgba(250,204,21,0.2)"}`,borderRadius:6,padding:"4px 9px",color:glassnodeKey?"#00e5a0":"#facc15",fontSize:10,cursor:"pointer"}}>⚙</button>
            </div>
          </div>
        </div>

        {/* Bias bar */}
        <div style={{marginTop:8,padding:"7px 10px",borderRadius:8,
          background:`linear-gradient(90deg,${OC}10,${OC}05)`,border:`1px solid ${OC}20`,
          display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:8,color:"rgba(255,255,255,0.25)",letterSpacing:"0.1em"}}>9-SIGNAL CONFLUENCE</div>
            <div style={{fontSize:11,fontWeight:700,color:OC,marginTop:1}}>
              {overall==="bull"?"LONG BIAS":overall==="bear"?"SHORT BIAS":"WAIT FOR SIGNAL"}
            </div>
          </div>
          <div style={{fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>
            <span style={{color:"#00e5a0"}}>{d.bullCount||0}▲</span>
            <span style={{color:"rgba(255,255,255,0.2)",margin:"0 4px"}}>/</span>
            <span style={{color:"#ff4d6d"}}>{d.bearCount||0}▼</span>
          </div>
        </div>

        {/* Signal pills */}
        <div className="pill-row" style={{marginTop:8}}>
          {sigList.map(({l,s})=>{
            const c=SIG[s]||SIG.neutral;
            return<div key={l} style={{flexShrink:0,background:`${c}10`,border:`1px solid ${c}25`,
              borderRadius:6,padding:"4px 9px",textAlign:"center",minWidth:38}}>
              <div style={{fontSize:7,color:"rgba(255,255,255,0.25)",letterSpacing:"0.05em",marginBottom:1}}>{l}</div>
              <div style={{fontSize:9,fontWeight:700,color:c}}>{s==="bull"?"▲":s==="bear"?"▼":"●"}</div>
            </div>;
          })}
        </div>
      </div>

      {/* ── Liquidity Risk Section ── */}
      <LiquidityBar liq={liq} liqLoading={liqLoading}/>

      {/* ── Tab content ── */}
      <div style={{padding:"12px 14px 0"}}>

        {/* CHART TAB */}
        {tab==="chart"&&(
          <div style={{animation:"fadein 0.3s ease"}}>
            <div style={{background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"12px 14px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:9,letterSpacing:"0.12em",color:"rgba(255,255,255,0.3)",textTransform:"uppercase"}}>BTC · Daily · 30 days</div>
                <div style={{display:"flex",gap:8,fontSize:9}}>
                  <span style={{color:"#facc15"}}>― EMA20</span>
                  <span style={{color:"#818cf8"}}>― EMA50</span>
                </div>
              </div>
              <CandleChart candles={d.dailyCandles} h={160}/>
            </div>
            {/* Quick stats under chart */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {[
                {l:"Fear & Greed",v:d.fngCur!=null?d.fngCur:"—",s:d.fngSig,note:d.fngLbl},
                {l:"BTC Dominance",v:d.dom?d.dom.toFixed(1)+"%":"—",s:d.domSig,note:d.dom>52?"Rising":"Neutral"},
                {l:"Funding Rate",v:d.fundLast!=null?(d.fundLast>=0?"+":"")+d.fundLast.toFixed(4)+"%":"—",s:d.fundSig,note:"Binance perps"},
                {l:"Open Interest",v:(d.oiVals&&d.oiVals.length?bil(d.oiVals[d.oiVals.length-1]):"—"),s:d.oiSig,note:`14d: ${d.oiChg!=null?pct(d.oiChg,1):"—"}`},
              ].map(({l,v,s,note})=>{
                const c=SIG[s]||SIG.neutral;
                return<div key={l} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${c}20`,borderRadius:12,padding:"11px 13px"}}>
                  <div style={{fontSize:8.5,color:"rgba(255,255,255,0.28)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>{l}</div>
                  <div style={{fontSize:18,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:"white",marginBottom:3}}>{v}</div>
                  <div style={{fontSize:9.5,color:"rgba(255,255,255,0.35)"}}>{note}</div>
                  <div style={{marginTop:6}}><Badge sig={s}/></div>
                </div>;
              })}
            </div>
          </div>
        )}

        {/* SIGNALS TAB */}
        {tab==="signals"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10,animation:"fadein 0.3s ease"}}>

            <Card title="Fear & Greed Index" value={d.fngCur!=null?d.fngCur:"—"} accent
              sub={`${d.fngLbl} · <30 = buy zone, >70 = sell zone`}
              sig={d.fngSig} loading={loading&&!d.fngCur}
              spark={d.fngVals} sparkColor={fngColor}
              note={`7-day: ${(d.fngVals?d.fngVals.join(" → "):"—")}`}/>

            {/* Dominance */}
            <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${d.domSig==="bull"?"rgba(0,229,160,0.18)":"rgba(255,255,255,0.07)"}`,borderRadius:14,padding:"15px 16px",animation:"fadein 0.35s ease"}}>
              <div style={{fontSize:9,letterSpacing:"0.13em",color:"rgba(255,255,255,0.3)",textTransform:"uppercase",marginBottom:8}}>BTC Dominance</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Arc value={d.dom} min={38} max={68} label="BTC.D %" color={SIG[d.domSig]||SIG.neutral}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:26,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{d.dom?d.dom.toFixed(1)+"%":"—"}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",marginTop:3}}>{d.dom>52?"Rising → BTC strength":d.dom<48?"Falling → altseason":"Neutral zone"}</div>
                  <div style={{marginTop:7}}><Badge sig={d.domSig}/></div>
                </div>
              </div>
            </div>

            <Card title="Funding Rate (Binance Perps)" accent
              value={d.fundLast!=null?(d.fundLast>=0?"+":"")+d.fundLast.toFixed(4)+"%":"—"}
              sub={`Annualised ≈ ${d.fund8h!=null?(d.fund8h>=0?"+":"")+d.fund8h.toFixed(1)+"%":"—"} · every 8h`}
              sig={d.fundSig} loading={loading&&d.fundLast==null}
              spark={d.fundRates} sparkColor={SIG[d.fundSig]}
              note={d.fundLast<-0.005?"Negative → shorts paying → bullish squeeze":d.fundLast>0.01?"Positive → longs overheated → fade rallies":"Neutral → no derivatives bias"}/>

            <Card title="Open Interest (Binance Perps)" accent
              value={(d.oiVals&&d.oiVals.length?bil(d.oiVals[d.oiVals.length-1]):"—")}
              sub={`14d: ${d.oiChg!=null?pct(d.oiChg,1):"—"} · ${d.oiTrend||"—"}`}
              sig={d.oiSig} loading={loading&&!(d.oiVals&&d.oiVals.length)}
              spark={(d.oiVals?d.oiVals.map(function(v){return v/1e9;}):null)} sparkColor={SIG[d.oiSig]}
              note={d.oiTrend==="rising"&&d.btcChg>0?"OI ↑ + Price ↑ → conviction longs":d.oiTrend==="rising"&&d.btcChg<0?"OI ↑ + Price ↓ → conviction shorts":"OI falling → positions closing"}/>

            <Card title="Weekly OBV" accent
              value={d.obvLast!=null&&d.obvEMALast!=null?(d.obvLast>d.obvEMALast?"▲ ABOVE MA":"▼ BELOW MA"):"—"}
              sub={d.obvBullDiv?"🟢 Hidden bull divergence — OBV ↑ while price ↓":d.obvBearDiv?"🔴 Bear divergence — OBV ↓ while price ↑":d.obvAboveMA?"Accumulation in progress":"Distribution / selling pressure"}
              sig={d.obvSig} loading={loading&&!(d.wklyObvArr&&d.wklyObvArr.length)}
              spark={(d.wklyObvArr?d.wklyObvArr.slice(-20):null)} sparkColor={SIG[d.obvSig]}
              note="Dishner: OBV must be ABOVE its MA for long bias. Divergence from price = strongest signal."/>

            {/* RSI */}
            <div style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${d.rsiSig==="bull"?"rgba(0,229,160,0.18)":d.rsiSig==="bear"?"rgba(255,77,109,0.15)":"rgba(255,255,255,0.07)"}`,borderRadius:14,padding:"15px 16px",animation:"fadein 0.35s ease",position:"relative",overflow:"hidden"}}>
              <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${SIG[d.rsiSig]||SIG.neutral},transparent)`}}/>
              <div style={{fontSize:9,letterSpacing:"0.13em",color:"rgba(255,255,255,0.3)",textTransform:"uppercase",marginBottom:8}}>Weekly RSI (14)</div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <Arc value={d.wklyRSI} min={0} max={100} label="RSI wkly" color={d.rsiSig==="bull"?"#00e5a0":d.rsiSig==="bear"?"#ff4d6d":"#facc15"}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:26,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{d.wklyRSI!=null?d.wklyRSI.toFixed(1):"—"}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.38)",marginTop:3}}>
                    {d.wklyRSI<30?"Extreme oversold":d.wklyRSI<40?"Oversold buy zone":d.wklyRSI>70?"Extreme overbought":d.wklyRSI>65?"Overbought":"Mid-range"}
                  </div>
                  <div style={{marginTop:7,display:"flex",alignItems:"center",gap:8}}>
                    <Badge sig={d.rsiSig}/>
                    {d.rsiHistory&&d.rsiHistory.length>0&&<Spark data={d.rsiHistory} color={d.rsiSig==="bull"?"#00e5a0":d.rsiSig==="bear"?"#ff4d6d":"#facc15"} h={22}/>}
                  </div>
                </div>
              </div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:7,marginTop:7,lineHeight:1.5}}>
                Dishner: RSI must be making a new uptrend (higher lows). Weekly &lt;30 = max conviction long.
              </div>
            </div>

            <Card title="Weekly Volume Structure" accent
              value={d.volRatio!=null?d.volRatio.toFixed(2)+"× avg":"—"}
              sub={d.volCapit?"🟢 Capitulation — vol spike on red close":d.volDist?"🔴 Distribution — vol spike on green close":"Normal volume — no structural signal"}
              sig={d.volSig} loading={loading&&!(d.wklyVols&&d.wklyVols.length)}
              spark={(d.wklyVols?d.wklyVols.slice(-20):null)} sparkColor={SIG[d.volSig]}
              note="Dishner: Big red vol candle at lows = exhaustion/reversal. Volume must confirm the move."/>

            <Card title="BTC Spot ETF Flows (Daily)" accent
              value={d.etfLatest!=null?(d.etfLatest>=0?"+":"")+d.etfLatest.toFixed(0)+(d.etfMode==="glassnode"?" BTC":" M USD"):glassnodeKey?"Loading…":"Add API key"}
              sub={d.etfAvg7!=null?(d.etfMode==="glassnode"?`7d avg: ${d.etfAvg7>=0?"+":""}${d.etfAvg7.toFixed(0)} BTC/day · Glassnode`:`7d avg: ${d.etfAvg7>=0?"+":""}${d.etfAvg7.toFixed(0)}M USD`):glassnodeKey?"Fetching from Glassnode…":"Tap ⚙ to add free Glassnode key"}
              sig={d.etfSig||"neutral"} loading={loading&&!(d.etfFlows&&d.etfFlows.length)}
              spark={d.etfFlows} sparkColor={SIG[d.etfSig||"neutral"]}
              note={d.etfLatest==null?(glassnodeKey?"Key set but no data — check key at studio.glassnode.com":"No API key. Tap ⚙ above. Backup: farside.co.uk"):d.etfSig==="bull"?"Net inflows → institutions buying → bullish demand":d.etfSig==="bear"?"Net outflows → institutional selling → bearish":"Mixed ETF flows — no strong directional bias"}/>

            <Card title="BTC Exchange Reserves" accent
              value={d.resLatest!=null?new Intl.NumberFormat("en-US",{notation:"compact",maximumFractionDigits:2}).format(d.resLatest/1e6)+"M BTC":glassnodeKey?"Loading…":"Add API key"}
              sub={d.resTrend&&d.resChg!=null?`14d: ${d.resChg>=0?"+":""}${d.resChg.toFixed(2)}% · trend: ${d.resTrend} · Glassnode`:glassnodeKey?"Fetching from Glassnode…":"Tap ⚙ to add free Glassnode key"}
              sig={d.resSig||"neutral"} loading={loading&&!(d.resHist&&d.resHist.length)}
              spark={d.resHist} sparkColor={SIG[d.resSig||"neutral"]}
              note={d.resLatest==null?(glassnodeKey?"Key set but no data — verify at studio.glassnode.com/settings/api":"No API key. Tap ⚙. Backup: cryptoquant.com"):d.resSig==="bull"?"Reserves falling → BTC leaving exchanges → supply squeeze (bullish)":d.resSig==="bear"?"Reserves rising → BTC moving TO exchanges → sell pressure":"Reserves stable — no supply shock signal"}/>

            {/* Checklist CTA */}
            <button onClick={()=>setSheet("checklist")} style={{width:"100%",background:"rgba(255,255,255,0.04)",
              border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"14px 16px",
              color:"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",
              animation:"fadein 0.35s ease"}}>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:11,fontWeight:700,marginBottom:2}}>Signal Checklist</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.35)"}}>Long / Short / Skip / Size Up criteria</div>
              </div>
              <span style={{fontSize:18,color:"rgba(255,255,255,0.3)"}}>›</span>
            </button>
          </div>
        )}

        {/* MANUAL TAB */}
        {tab==="manual"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8,animation:"fadein 0.3s ease"}}>
            {[
              {label:"ETF Flows (Farside)",url:"https://farside.co.uk/bitcoin-etf-flow-all-data/",hint:"Daily inflow/outflow across all spot BTC ETFs. Backup for live ETF card.",icon:"📊"},
              {label:"Exchange Reserves (CryptoQuant)",url:"https://cryptoquant.com/asset/btc/chart/exchange-flows/exchange-reserve",hint:"BTC held on exchanges — declining = supply leaving = bullish.",icon:"🏦"},
              {label:"Miner Outflows (CryptoQuant)",url:"https://cryptoquant.com/asset/btc/chart/miner-flows/miner-to-exchange-all",hint:"BTC moving miner→exchange = potential selling pressure.",icon:"⛏"},
              {label:"CME Futures + OI (TradingView)",url:"https://www.tradingview.com/chart/?symbol=CME%3ABTC1%21",hint:"Check OI trend, gap levels. OBV above MA line = bullish.",icon:"📉"},
              {label:"TBT Divergence — @MooninPapa",url:"https://x.com/MooninPapa",hint:"Aaron Dishner's True Bearish/Bullish Trend divergence. Add to weekly chart.",icon:"🐦"},
              {label:"Glassnode API Key",url:"https://studio.glassnode.com/settings/api",hint:"Free account. Unlocks live ETF holdings and exchange reserves cards.",icon:"🔑"},
            ].map(({label,url,hint,icon})=>(
              <a key={label} href={url} target="_blank" rel="noopener noreferrer"
                style={{display:"flex",gap:12,alignItems:"flex-start",background:"rgba(255,255,255,0.03)",
                  border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"14px 15px",
                  textDecoration:"none",color:"white",animation:"fadein 0.35s ease"}}>
                <div style={{fontSize:20,flexShrink:0,marginTop:1}}>{icon}</div>
                <div>
                  <div style={{fontSize:12.5,fontWeight:600,color:"#7dd3fc",marginBottom:4}}>{label} <span style={{fontSize:9,opacity:0.5}}>↗</span></div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",lineHeight:1.5}}>{hint}</div>
                </div>
              </a>
            ))}
            <div style={{fontSize:9,color:"rgba(255,255,255,0.15)",textAlign:"center",padding:"12px 0 4px",lineHeight:1.6}}>
              Binance · CoinGecko · Alternative.me · allorigins.win proxy<br/>
              Auto-refreshes every 60s · OBV/RSI computed client-side · Not financial advice
            </div>
          </div>
        )}
      </div>

      {/* ── Bottom tab bar ── */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:50,
        background:"rgba(8,12,23,0.97)",backdropFilter:"blur(20px)",
        borderTop:"1px solid rgba(255,255,255,0.08)"}}>
        <div style={{display:"flex",padding:"6px 0 env(safe-area-inset-bottom,6px)"}}>
          {TABS.map(({id,icon,label})=>(
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,display:"flex",flexDirection:"column",
              alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",
              padding:"6px 0",color:tab===id?OC:"rgba(255,255,255,0.3)",transition:"color 0.2s"}}>
              <span style={{fontSize:17}}>{icon}</span>
              <span style={{fontSize:9,fontWeight:tab===id?700:400,letterSpacing:"0.04em"}}>{label}</span>
              {tab===id&&<div style={{width:16,height:2,borderRadius:1,background:OC,marginTop:1}}/>}
            </button>
          ))}
        </div>
      </div>

      {/* ── Bottom sheets ── */}
      {sheet==="settings"&&<SettingsSheet onClose={()=>setSheet(null)} glassnodeKey={glassnodeKey} setGlassnodeKey={setGlassnodeKey} fetchAll={fetchAll}/>}
      {sheet==="checklist"&&<ChecklistSheet onClose={()=>setSheet(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
